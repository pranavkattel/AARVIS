<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mirror</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh; background: #0a0a12;
            display: flex; overflow: hidden;
        }

        /* ── Left: full camera panel ── */
        .cam-panel {
            flex: 1; position: relative; display: flex;
            align-items: center; justify-content: center;
            background: #06060e;
        }
        #faceVideo {
            width: 100%; height: 100vh; object-fit: cover;
            transform: scaleX(-1); display: block;
            filter: brightness(.92);
        }
        .cam-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            padding: 32px 28px;
            background: linear-gradient(to bottom, rgba(0,0,0,.55) 0%, transparent 30%, transparent 70%, rgba(0,0,0,.65) 100%);
        }
        .mirror-title {
            font-size: 22px; font-weight: 700; letter-spacing: 3px;
            color: rgba(255,255,255,.9); text-transform: uppercase;
            text-shadow: 0 2px 12px rgba(0,0,0,.6);
        }
        /* scanning reticle */
        .reticle {
            width: 220px; height: 220px; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .reticle::before, .reticle::after,
        .reticle span::before, .reticle span::after {
            content: ''; position: absolute; width: 36px; height: 36px;
            border-color: rgba(102,126,234,.85); border-style: solid;
        }
        .reticle::before  { top: 0; left: 0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .reticle::after   { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .reticle span::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
        .reticle span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
        .scan-line {
            position: absolute; left: 8px; right: 8px; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(102,126,234,.8), transparent);
            animation: scan 2.4s ease-in-out infinite;
        }
        @keyframes scan { 0%,100% { top: 8px; opacity: 0; } 10%,90% { opacity: 1; } 50% { top: calc(100% - 10px); } }
        .face-status {
            font-size: 14px; color: rgba(255,255,255,.75);
            background: rgba(0,0,0,.45); padding: 6px 16px;
            border-radius: 20px; letter-spacing: .5px;
        }
        .face-status.matched {
            color: #69f0ae; background: rgba(0,180,80,.25);
            border: 1px solid rgba(105,240,174,.4);
        }
        .face-status.error { color: #ff6e6e; background: rgba(180,0,0,.25); }
        .cam-bottom {
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        /* fallback options strip */
        .alt-strip {
            display: flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: center;
        }
        .btn-google-small {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 16px; background: rgba(255,255,255,.1);
            color: #fff; border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
            font-size: 13px; font-weight: 600; text-decoration: none;
            transition: background .2s;
        }
        .btn-google-small:hover { background: rgba(255,255,255,.18); }
        .toggle-pw {
            background: none; border: none; color: rgba(255,255,255,.5);
            font-size: 12px; cursor: pointer; text-decoration: underline;
        }
        .pw-form {
            display: none; background: rgba(0,0,0,.55); border-radius: 10px;
            padding: 14px 16px; width: 100%; max-width: 320px;
        }
        .pw-form input {
            width: 100%; padding: 9px 12px; margin-bottom: 8px;
            background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
            border-radius: 7px; color: #fff; font-size: 13px;
        }
        .pw-form input::placeholder { color: rgba(255,255,255,.4); }
        .pw-form input:focus { outline: none; border-color: #667eea; }
        .pw-btn {
            width: 100%; padding: 9px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; border: none; border-radius: 7px;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .pw-err { color: #ff6e6e; font-size: 12px; margin-top: 4px; display: none; }
        .footer-tip {
            font-size: 12px; color: rgba(255,255,255,.3);
        }
        .footer-tip a { color: rgba(102,126,234,.8); text-decoration: none; }

        /* ── Right: QR panel ── */
        .qr-panel {
            width: 40vh; flex-shrink: 0;
            background: rgba(255,255,255,.04);
            border-left: 1px solid rgba(255,255,255,.08);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 14px; padding: 28px 18px;
        }
        .qr-panel .title {
            font-size: 13px; font-weight: 700; color: rgba(255,255,255,.8);
            text-align: center; letter-spacing: .4px;
        }
        .qr-panel .sub {
            font-size: 11px; color: rgba(255,255,255,.4);
            text-align: center; line-height: 1.6;
        }
        #qrcode { 
            border-radius: 10px; 
            overflow: hidden;
            background: #fff;
            padding: 10px;
        }
        #qrcode img, #qrcode canvas {
            display: block;
        }
        .qr-url { font-size: 9px; color: rgba(255,255,255,.2); text-align: center; word-break: break-all; }
        .pair-ok {
            display: none; text-align: center;
            color: #69f0ae; font-size: 13px; font-weight: 600; line-height: 1.6;
        }
        .new-user-link {
            font-size: 11px; color: rgba(255,255,255,.35); text-align: center;
        }
        .new-user-link a { color: rgba(102,126,234,.7); text-decoration: none; }
    </style>
</head>
<body>

    <!-- Camera panel -->
    <div class="cam-panel">
        <video id="faceVideo" autoplay playsinline muted></video>
        <div class="cam-overlay">
            <div class="mirror-title">&#129710; Smart Mirror</div>

            <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
                <div class="reticle"><span></span><div class="scan-line"></div></div>
                <div class="face-status" id="faceStatus">Looking for your face…</div>
            </div>

            <div class="cam-bottom">
                <div class="alt-strip">
                    <a href="/auth/google?intent=login" class="btn-google-small">
                        <svg width="16" height="16" viewBox="0 0 48 48">
                            <path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.2 33.3 29.6 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l6-6C34.5 6.5 29.6 4.5 24 4.5 12.7 4.5 3.5 13.7 3.5 25S12.7 45.5 24 45.5c11 0 20.5-8 20.5-20.5 0-1.4-.1-2.7-.5-5z"/>
                            <path fill="#34A853" d="M6.3 14.7l7 5.1C15.1 17 19.3 14 24 14c3.1 0 5.9 1.2 8 3.1l6-6C34.5 6.5 29.6 4.5 24 4.5c-7.6 0-14.2 4.3-17.7 10.2z"/>
                            <path fill="#FBBC05" d="M24 45.5c5.5 0 10.4-1.9 14.2-5.1l-6.6-5.4C29.6 36.8 27 37.5 24 37.5c-5.5 0-10.2-3.6-11.8-8.6l-7 5.4C8.3 41.4 15.5 45.5 24 45.5z"/>
                            <path fill="#EA4335" d="M44.5 20H24v8.5h11.7c-.8 2.3-2.3 4.2-4.3 5.5l6.6 5.4c3.9-3.6 6-8.9 6-15.4 0-1.4-.1-2.7-.5-5z"/>
                        </svg>
                        Sign in with Google
                    </a>
                    <button class="toggle-pw" onclick="togglePW(this)">Username &amp; password</button>
                </div>
                <div class="pw-form" id="pwForm">
                    <input type="text" id="username" placeholder="Username">
                    <input type="password" id="password" placeholder="Password">
                    <div class="pw-err" id="pwErr"></div>
                    <button class="pw-btn" onclick="handlePWLogin(event)">Sign In</button>
                </div>
                <div class="footer-tip">New user? <a href="/register">Register here</a></div>
            </div>
        </div>
    </div>

    <!-- QR panel -->
    <div class="qr-panel">
        <div class="title">&#128242; Register from phone</div>
        <div class="sub">Same Wi-Fi — scan to sign up or sign in on your phone</div>
        <div id="qrcode"></div>
        <div class="qr-url" id="qrUrl"></div>
        <div class="pair-ok" id="pairOk">&#10003; Phone connected!<br>Loading…</div>
        <div class="new-user-link"><a href="/register">Open register page ↗</a></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        // ── Face login (auto-start) ─────────────────────────────────────
        let faceStream = null, faceInterval = null;

        async function startFace() {
            try {
                faceStream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
                const vid = document.getElementById('faceVideo');
                vid.srcObject = faceStream;
                await vid.play();
                faceInterval = setInterval(doFaceCheck, 2000);
            } catch (e) {
                setStatus('Camera unavailable — use Google or password below', 'error');
            }
        }

        function setStatus(msg, cls) {
            const el = document.getElementById('faceStatus');
            el.textContent = msg;
            el.className = 'face-status' + (cls ? ' ' + cls : '');
        }

        async function doFaceCheck() {
            const vid = document.getElementById('faceVideo');
            if (!vid.videoWidth) return;
            const canvas = document.createElement('canvas');
            canvas.width = vid.videoWidth; canvas.height = vid.videoHeight;
            canvas.getContext('2d').drawImage(vid, 0, 0);
            try {
                const res = await fetch('/api/face/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ image: canvas.toDataURL('image/jpeg', 0.75) })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    clearInterval(faceInterval);
                    if (faceStream) faceStream.getTracks().forEach(t => t.stop());
                    localStorage.setItem('sessionToken', data.token);
                    setStatus('Welcome back, ' + data.username + '! ✓', 'matched');
                    setTimeout(() => window.location.href = '/', 900);
                } else {
                    setStatus(data.message || 'Looking for your face…');
                }
            } catch (e) { /* silently retry */ }
        }

        // ── Password fallback ───────────────────────────────────────────
        function togglePW(btn) {
            const f = document.getElementById('pwForm');
            const show = f.style.display !== 'block';
            f.style.display = show ? 'block' : 'none';
            btn.textContent = show ? 'Hide' : 'Username & password';
        }

        async function handlePWLogin(event) {
            event.preventDefault();
            const err = document.getElementById('pwErr');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username || !password) { err.textContent = 'Enter username and password.'; err.style.display = 'block'; return; }
            err.style.display = 'none';
            try {
                const res = await fetch('/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) { localStorage.setItem('sessionToken', data.token); window.location.href = '/'; }
                else { err.textContent = data.detail || 'Login failed.'; err.style.display = 'block'; }
            } catch (e) { err.textContent = 'Connection error.'; err.style.display = 'block'; }
        }

        // ── QR + pairing ────────────────────────────────────────────────
        const PAIR_TOKEN = '{{ pair_token }}';
        const QR_URL = '{{ qr_url or "" }}';
        let pairPollInterval = null;

        async function initQR() {
            try {
                let finalUrl = QR_URL;
                if (!finalUrl) {
                    const res = await fetch(`/api/local-url?path=/mobile-connect%3Fpair%3D${PAIR_TOKEN}`);
                    const data = await res.json();
                    finalUrl = data.url;
                }
                document.getElementById('qrUrl').textContent = finalUrl;
                const qrSize = Math.round(window.innerHeight / 3);
                new QRCode(document.getElementById('qrcode'), {
                    text: finalUrl, width: qrSize, height: qrSize,
                    colorDark: '#1a1a2e', colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
            } catch(e) {}
        }

        async function pollPair() {
            try {
                const res = await fetch(`/api/pair-status/${PAIR_TOKEN}`);
                const data = await res.json();
                if (data.status === 'triggered') {
                    clearInterval(pairPollInterval);
                    document.getElementById('qrcode').style.display = 'none';
                    document.getElementById('pairOk').textContent = '\u2713 Phone requested PC fallback. Opening Google sign-in...';
                    document.getElementById('pairOk').style.display = 'block';
                    setTimeout(() => {
                        window.location.href = `/auth/google?intent=login&pair=${PAIR_TOKEN}`;
                    }, 650);
                    return;
                }
                if (data.status === 'complete') {
                    clearInterval(pairPollInterval);
                    document.getElementById('qrcode').style.display = 'none';
                    if (data.session_token) {
                        localStorage.setItem('sessionToken', data.session_token);
                    }
                    if (data.redirect_pc) {
                        document.getElementById('pairOk').textContent = '\u2713 Google done on phone. Continue face setup on this PC...';
                        document.getElementById('pairOk').style.display = 'block';
                        setTimeout(() => {
                            window.location.href = data.dest || '/setup-face';
                        }, 700);
                        return;
                    }
                    document.getElementById('pairOk').textContent = '\u2713 Google sign-in completed on phone.';
                    document.getElementById('pairOk').style.display = 'block';
                }
            } catch(e) {}
        }

        startFace();
        initQR();
        pairPollInterval = setInterval(pollPair, 1500);
    </script>
</body>
</html>
